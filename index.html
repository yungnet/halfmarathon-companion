<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HM Companion" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>Half Marathon Companion</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">
        <span class="app-icon">🏃</span>
        HM Companion
      </h1>
    </header>

    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="heatmap" role="tab" aria-selected="true">
        <span class="tab-icon">🗺️</span>
        <span class="tab-label">Routes</span>
      </button>
      <button class="tab-btn" data-tab="shoes" role="tab" aria-selected="false">
        <span class="tab-icon">👟</span>
        <span class="tab-label">Shoes</span>
      </button>
      <button class="tab-btn" data-tab="fuel" role="tab" aria-selected="false">
        <span class="tab-icon">⚡</span>
        <span class="tab-label">Fuel</span>
      </button>
      <button class="tab-btn" data-tab="zones" role="tab" aria-selected="false">
        <span class="tab-icon">❤️</span>
        <span class="tab-label">Zones</span>
      </button>
    </nav>

    <main class="tab-content">
      <section id="tab-heatmap" class="tab-panel active" role="tabpanel">
        <div id="heatmap-root"></div>
      </section>
      <section id="tab-shoes" class="tab-panel" role="tabpanel">
        <div id="shoes-root"></div>
      </section>
      <section id="tab-fuel" class="tab-panel" role="tabpanel">
        <div id="fuel-root"></div>
      </section>
      <section id="tab-zones" class="tab-panel" role="tabpanel">
        <div id="zones-root"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
